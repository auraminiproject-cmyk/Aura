# Unsloth QLoRA — Qwen2.5-VL-7B Fine-tuning for Indian Fashion
# Runtime: Colab T4 Free (16GB VRAM) — ~2 hours for 500 examples
#
# Dataset format: ShareGPT conversations with Indian fashion Q&A
# Covers: garment identification, style advice, color theory,
#         occasion-based recommendations, multilingual (en/te/hi)

model:
  name: Qwen/Qwen2.5-VL-7B-Instruct
  method: qlora
  load_in_4bit: true
  max_seq_length: 2048

lora:
  rank: 64
  alpha: 128
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  dropout: 0.05
  bias: none

training:
  learning_rate: 2.0e-4
  warmup_ratio: 0.1
  epochs: 3
  per_device_batch_size: 2
  gradient_accumulation_steps: 4
  weight_decay: 0.01
  max_grad_norm: 1.0
  fp16: true
  optim: adamw_8bit
  lr_scheduler_type: cosine
  logging_steps: 10
  save_steps: 100
  eval_steps: 50
  seed: 42

dataset:
  path: data/processed/fashion_vlm_sharegpt.json
  validation_split: 0.1
  prompt_template: |
    You are AURA, an expert AI fashion stylist specializing in Indian ethnic
    and contemporary fashion. You understand fabrics, draping styles, color
    theory for different skin tones, regional preferences, and budget-conscious
    recommendations. Respond warmly and precisely.

output:
  dir: models/checkpoints/fashion-vlm
  push_to_hub: false
  hub_model_id: null

evaluation:
  metrics:
    - rouge_l
    - bleu
  eval_on_start: true
