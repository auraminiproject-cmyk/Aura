# OPTIONAL — Render free tier may change card requirements. Prefer deploy/huggingface/ (no card).
# See docs/FREE_STACK.md before using.

services:
  - type: web
    name: fashion-ai-api
    runtime: docker
    dockerfilePath: ./services/api/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./fashionai.db
      - key: STORAGE_BACKEND
        value: local
      - key: STORAGE_LOCAL_PATH
        value: ./storage
      - key: GROQ_API_KEY
        sync: false
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: QDRANT_URL
        value: http://localhost:6333
      - key: APP_SECRET_KEY
        generateValue: true
      - key: APP_ENV
        value: production
