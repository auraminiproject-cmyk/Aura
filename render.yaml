# Render Blueprint — AURA Fashion AI
# Supports canary deployment via preview environments
# See docs/FREE_STACK.md before using.

services:
  # ── Production API ─────────────────────────────────────────────────
  - type: web
    name: fashion-ai-api
    runtime: docker
    dockerfilePath: ./services/api/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    branch: main
    envVars:
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./fashionai.db
      - key: STORAGE_BACKEND
        value: local
      - key: STORAGE_LOCAL_PATH
        value: ./storage
      - key: GROQ_API_KEY
        sync: false
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: QDRANT_URL
        value: http://localhost:6333
      - key: APP_SECRET_KEY
        generateValue: true
      - key: APP_ENV
        value: production
      - key: REDIS_URL
        value: redis://red-placeholder:6379/0

  # ── Canary API (preview environment) ───────────────────────────────
  # Render auto-creates preview environments for PRs.
  # This config ensures preview uses the same Dockerfile but
  # with APP_ENV=canary and separate DB for safe testing.

previews:
  generation: automatic
  startCommand: null
  envVars:
    - key: APP_ENV
      value: canary
    - key: DATABASE_URL
      value: sqlite+aiosqlite:///./fashionai_canary.db
    - key: APP_SECRET_KEY
      generateValue: true
