version: "3.8"

services:
  # ── Core API ─────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./services/api:/app/services/api
      - ./services/agent:/app/services/agent
      - ./services/vision:/app/services/vision
      - ./services/retrieval:/app/services/retrieval
      - ./services/wardrobe:/app/services/wardrobe
      - ./data:/app/data
      - storage_data:/app/storage
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/fashionai
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      OLLAMA_BASE_URL: http://ollama:11434
      LITELLM_PROXY_URL: http://litellm:4000
      S3_ENDPOINT: http://minio:9000
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      HUGGINGFACE_API_KEY: ${HUGGINGFACE_API_KEY:-}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-https://cloud.langfuse.com}
      POSTHOG_API_KEY: ${POSTHOG_API_KEY:-}
      APP_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      qdrant:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Celery Worker (DLQ-enabled task processing) ────────────────────
  celery-worker:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    command: celery -A services.api.tasks.celery_app worker --loglevel=info --concurrency=2
    volumes:
      - ./services:/app/services
      - ./data:/app/data
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/fashionai
      REDIS_URL: redis://redis:6379/0
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      HUGGINGFACE_API_KEY: ${HUGGINGFACE_API_KEY:-}
    depends_on:
      - redis
      - api

  # ── LiteLLM Proxy (unified LLM routing) ───────────────────────────
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    ports:
      - "4000:4000"
    volumes:
      - ./infra/litellm/config.yaml:/app/config.yaml
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY:-}
    depends_on:
      - ollama

  # ── Data Stores ────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fashionai
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  # ── AI / ML ────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  # ── Object Storage (S3-compatible, replaces R2 — no card needed) ──
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  # ── Observability ──────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/fashion-ai.json
    volumes:
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus

volumes:
  postgres_data: {}
  redis_data: {}
  qdrant_data: {}
  ollama_data: {}
  minio_data: {}
  storage_data: {}
