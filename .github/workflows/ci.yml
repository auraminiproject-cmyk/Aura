name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Keep HF Inference warm + Render alive (every 10 min)
    - cron: '*/10 * * * *'

jobs:
  test-api:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run pytest
        env:
          DATABASE_URL: sqlite+aiosqlite:///:memory:
          REDIS_URL: redis://localhost:6379/0
        run: pytest tests/ -v --cov=services --cov-report=term-missing --cov-fail-under=60
      - name: Semgrep SAST
        continue-on-error: true
        run: pip install semgrep && semgrep --config auto services/ || true

  build-docker:
    runs-on: ubuntu-latest
    needs: test-api
    steps:
      - uses: actions/checkout@v4
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: services/api/Dockerfile
          push: false
          tags: fashion-ai-api:latest

  trivy-scan:
    runs-on: ubuntu-latest
    needs: build-docker
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem scan (SCA)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          format: 'table'
      - name: Trivy container scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'fashion-ai-api:latest'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          format: 'table'

  flutter:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Flutter analyze
        working-directory: apps/mobile
        run: |
          flutter pub get
          dart run build_runner build
          flutter analyze

  keep-alive:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render
        run: curl -sf https://aura1-3rk2.onrender.com/health || true
      - name: Warm HF Inference models
        env:
          HF_API_KEY: ${{ secrets.HUGGINGFACE_API_KEY }}
        run: |
          curl -sf -H "Authorization: Bearer $HF_API_KEY" \
            https://api-inference.huggingface.co/models/patrickjohncyh/fashion-clip \
            -d '{"inputs": "warm up"}' || true
          curl -sf -H "Authorization: Bearer $HF_API_KEY" \
            https://api-inference.huggingface.co/models/facebook/mms-tts-eng \
            -d '{"inputs": "warm up"}' || true

